<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Feedback Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <aside class="sidebar">
    <h2>Feedback</h2>
    <nav>
      <p>Dashboard</p>
      <p>Requests</p>
      <p>Completed</p>
    </nav>
  </aside>

  <main class="main">

    <header class="header">
      <h1>Product Feedback</h1>
    </header>

    <section class="input-area">
      <form id="feedback-form">
        <input id="feedback-input" type="text" placeholder="Enter feedback..." required>
        <button type="submit">Add Feedback</button>
      </form>
    </section>

    <section id="feedback-list"></section>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
